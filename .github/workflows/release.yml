name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set timezone
        run: sudo timedatectl set-timezone America/Sao_Paulo

      - name: Verify timezone
        run: timedatectl && date

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Install TailwindCSS
        run: |
          curl -fsSL https://github.com/tailwindlabs/tailwindcss/releases/download/v4.2.0/tailwindcss-linux-x64 \
            -o /tmp/tailwindcss
          sudo mv /tmp/tailwindcss /usr/local/bin/tailwindcss
          sudo chmod +x /usr/local/bin/tailwindcss

      - name: Install Go dependencies
        run: make deps

      - name: Build
        run: make css build-prod

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ARCHIVE="zabbix-statuspage_${VERSION}_linux_amd64.tar.gz"
          tar -czvf "${ARCHIVE}" -C bin zabbix-statuspage
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
