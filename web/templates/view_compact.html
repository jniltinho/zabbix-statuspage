{{define "view-compact"}}
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-2 mb-4 max-h-96 overflow-y-auto border border-black p-1">
    {{range .Data.Hosts}}
    <div>{{template "card-compact" .}}</div>
    {{end}}
</div>
{{if .Data.History}}
<div class="flex flex-wrap gap-1 mt-2 max-h-48 overflow-y-auto border border-black p-1">
    {{range .Data.History}}
    <span class="border border-black text-[10px] px-1.5 py-0.5 font-mono bg-[#ffd500] text-black">
        <strong><time datetime="{{.ClockISO}}">{{.ClockISO}}</time></strong> {{.Name}}
    </span>
    {{end}}
</div>
{{end}}
{{end}}
