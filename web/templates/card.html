{{define "card"}}
<div class="flex items-center gap-3 border border-black bg-white px-3 py-2 neo-shadow-sm">

    {{/* Status icon */}}
    {{if .HasProblem}}
        <i data-lucide="alert-circle" class="shrink-0 w-4 h-4 text-yellow-600"></i>
    {{else}}
        <i data-lucide="check-circle" class="shrink-0 w-4 h-4 text-green-600"></i>
    {{end}}

    {{/* Name */}}
    <span class="font-bold text-xs w-48 shrink-0">{{.Label}}</span>

    {{/* Uptime % badge */}}
    <span class="text-[10px] font-mono text-gray-500 shrink-0 w-24">↗ 24h {{printf "%.2f" .UptimePct}}%</span>

    {{/* Status badge */}}
    <span class="shrink-0 w-20 text-center text-[10px] font-semibold px-2 py-0.5 border border-black
        {{if eq .StatusLabel "Outage"}}bg-red-500 text-white
        {{else if eq .StatusLabel "Degraded"}}bg-[#ffd500] text-black
        {{else}}bg-[#00c950] text-black{{end}}">
        {{.StatusLabel}}
    </span>

    {{/* Uptime bar */}}
    <div class="flex gap-px flex-1 h-5 items-stretch overflow-hidden">
        {{range .UptimeBars}}
        <div class="flex-1 {{if .}}bg-green-500{{else}}bg-red-500{{end}}"></div>
        {{end}}
    </div>

</div>
{{end}}
